<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#0f172a"/>
  <!-- Book/notebook base -->
  <g transform="translate(96,100)">
    <!-- Book spine -->
    <rect x="-48" y="-32" width="96" height="64" rx="6" fill="#4f46e5" opacity="0.3"/>
    <!-- Left page -->
    <path d="M-44,-28 L-4,-24 L-4,28 L-44,24 Z" fill="#818cf8" opacity="0.6"/>
    <!-- Right page -->
    <path d="M4,-24 L44,-28 L44,24 L4,28 Z" fill="#6366f1"/>
    <!-- Book spine center line -->
    <line x1="0" y1="-26" x2="0" y2="30" stroke="#a5b4fc" stroke-width="2" opacity="0.5"/>
    <!-- Page lines on right page -->
    <line x1="12" y1="-18" x2="36" y2="-20" stroke="#c7d2fe" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="-10" x2="36" y2="-12" stroke="#c7d2fe" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="-2" x2="36" y2="-4" stroke="#c7d2fe" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="6" x2="36" y2="4" stroke="#c7d2fe" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Lightbulb above the book -->
  <g transform="translate(96,52)">
    <!-- Bulb glow -->
    <circle cx="0" cy="0" r="22" fill="#6366f1" opacity="0.15"/>
    <circle cx="0" cy="0" r="16" fill="#6366f1" opacity="0.1"/>
    <!-- Bulb glass -->
    <path d="M0,-18 C-11,-18 -16,-10 -16,-2 C-16,5 -12,9 -8,13 L-8,16 L8,16 L8,13 C12,9 16,5 16,-2 C16,-10 11,-18 0,-18Z" fill="#a5b4fc" opacity="0.9"/>
    <!-- Bulb base -->
    <rect x="-6" y="16" width="12" height="4" rx="1" fill="#818cf8"/>
    <rect x="-5" y="20" width="10" height="3" rx="1.5" fill="#6366f1"/>
    <!-- Filament lines -->
    <path d="M-3,6 Q0,0 3,6" fill="none" stroke="#e0e7ff" stroke-width="1.5" opacity="0.8"/>
    <path d="M-3,2 Q0,-4 3,2" fill="none" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>
    <!-- Light rays -->
    <line x1="0" y1="-24" x2="0" y2="-28" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-14" y1="-14" x2="-17" y2="-17" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="14" y1="-14" x2="17" y2="-17" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-20" y1="0" x2="-24" y2="0" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="0" x2="24" y2="0" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
