  <g transform="translate(16,18)">
    <path d="M-8,-5 L-1,-4 L-1,6 L-8,5 Z" fill="#818cf8" opacity="0.7"/>
    <path d="M1,-4 L8,-5 L8,5 L1,6 Z" fill="#6366f1"/>
