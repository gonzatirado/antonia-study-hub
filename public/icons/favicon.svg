    <!-- Tiny rays -->
    <line x1="0" y1="-7" x2="0" y2="-8.5" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="-5" y1="-4" x2="-6.5" y2="-5" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="5" y1="-4" x2="6.5" y2="-5" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
