    <circle cx="0" cy="0" r="5" fill="#6366f1" opacity="0.15"/>
    <path d="M0,-5 C-3,-5 -5,-3 -5,0 C-5,2 -3.5,3 -2.5,4 L-2.5,5 L2.5,5 L2.5,4 C3.5,3 5,2 5,0 C5,-3 3,-5 0,-5Z" fill="#a5b4fc" opacity="0.9"/>
