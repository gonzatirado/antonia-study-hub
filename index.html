<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Topographic background -->
  <div class="topo-bg"></div>

  <!-- Sidebar navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4L36 36H4L20 4Z" stroke="url(#grad1)" stroke-width="2" fill="none"/>
          <path d="M20 12L30 32H10L20 12Z" stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.6"/>
          <path d="M20 20L24 28H16L20 20Z" fill="url(#grad1)" opacity="0.4"/>
          <defs>
            <linearGradient id="grad1" x1="4" y1="4" x2="36" y2="36">
              <stop offset="0%" stop-color="#9B72CF"/>
              <stop offset="50%" stop-color="#2D9B6F"/>
              <stop offset="100%" stop-color="#E8973A"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name" id="brand-user-name">Study</span>
        <span class="brand-sub">Hub</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <a href="#" class="nav-item active" data-view="dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-view="schedule">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Horario</span>
      </a>
      <a href="#" class="nav-item" data-view="stats">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Estadisticas</span>
      </a>

      <div class="nav-divider"></div>
      <span class="nav-label">Asignaturas</span>
      <div id="nav-subjects"></div>
      <button class="nav-add-subject" id="add-subject-btn" title="Agregar asignatura">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Nueva asignatura</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="settings-btn" id="settings-btn" title="Configuracion">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </nav>

  <!-- Mobile header -->
  <header class="mobile-header" id="mobile-header">
    <button class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-title" id="mobile-brand-title">Study Hub</span>
    <button class="theme-toggle mobile-theme" id="mobile-theme-toggle">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <!-- Views are rendered here by app.js -->
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Configuracion</h2>
        <button class="modal-close" id="settings-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="user-name-input">Tu nombre</label>
          <input type="text" id="user-name-input" placeholder="Tu nombre..." class="setting-input">
        </div>
        <div class="setting-group">
          <label for="gemini-key-input">Google Gemini API Key (gratis)</label>
          <p class="setting-hint">Obtenla gratis en <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--amethyst)">aistudio.google.com/apikey</a></p>
          <input type="password" id="gemini-key-input" placeholder="AIza..." class="setting-input">
        </div>
        <div class="setting-group">
          <label for="api-key-input">Claude API Key (opcional, mejor calidad)</label>
          <p class="setting-hint">Si tienes una, se usara en vez de Gemini.</p>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." class="setting-input">
        </div>
        <button class="btn btn-primary" id="save-settings">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Add Subject Modal -->
  <div class="modal-overlay" id="add-subject-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Nueva asignatura</h2>
        <button class="modal-close" id="add-subject-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="subject-name-input">Nombre completo</label>
          <input type="text" id="subject-name-input" placeholder="Ej: Fundamentos de Geoquimica" class="setting-input">
        </div>
        <div class="setting-group">
          <label for="subject-short-input">Nombre corto</label>
          <input type="text" id="subject-short-input" placeholder="Ej: Geoquimica" class="setting-input" maxlength="20">
        </div>
        <div class="setting-group">
          <label>Color</label>
          <div class="color-picker" id="color-picker">
            <button class="color-swatch active" data-color="#9B72CF" style="background:#9B72CF"></button>
            <button class="color-swatch" data-color="#2D9B6F" style="background:#2D9B6F"></button>
            <button class="color-swatch" data-color="#E8973A" style="background:#E8973A"></button>
            <button class="color-swatch" data-color="#3B6FA0" style="background:#3B6FA0"></button>
            <button class="color-swatch" data-color="#E8A0B4" style="background:#E8A0B4"></button>
            <button class="color-swatch" data-color="#4CAF8A" style="background:#4CAF8A"></button>
            <button class="color-swatch" data-color="#E74C3C" style="background:#E74C3C"></button>
            <button class="color-swatch" data-color="#F39C12" style="background:#F39C12"></button>
            <button class="color-swatch" data-color="#1ABC9C" style="background:#1ABC9C"></button>
            <button class="color-swatch" data-color="#8E44AD" style="background:#8E44AD"></button>
          </div>
        </div>
        <button class="btn btn-primary" id="save-subject">Crear asignatura</button>
      </div>
    </div>
  </div>

  <!-- Welcome Modal (first visit) -->
  <div class="modal-overlay" id="welcome-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Bienvenido a Study Hub</h2>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary);margin-bottom:16px">Para personalizar tu experiencia, necesitamos tu nombre.</p>
        <div class="setting-group">
          <label for="welcome-name-input">Como te llamas?</label>
          <input type="text" id="welcome-name-input" placeholder="Tu nombre..." class="setting-input" autofocus>
        </div>
        <button class="btn btn-primary" id="welcome-save" style="width:100%">Comenzar</button>
      </div>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2 id="confirm-title">Confirmar</h2>
        <button class="modal-close" id="confirm-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirm-message" style="color:var(--text-secondary);margin-bottom:20px"></p>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-secondary" id="confirm-cancel">Cancelar</button>
          <button class="btn btn-danger" id="confirm-accept">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
